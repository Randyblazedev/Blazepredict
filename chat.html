<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlazePredict Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .chat-container { position: fixed; bottom: 0; right: 20px; width: 350px; max-height: 450px; background-color: #fff; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); border-radius: 10px; }
    .chat-header { background-color: #25D366; color: white; padding: 15px; border-radius: 10px 10px 0 0; text-align: center; }
    .chat-box { padding: 10px; height: 300px; overflow-y: scroll; }
    .chat-message { display: flex; justify-content: flex-start; padding: 10px; }
    .chat-message .message { background-color: #f1f1f1; padding: 10px; border-radius: 10px; max-width: 70%; }
    .chat-message .message.sent { background-color: #DCF8C6; align-self: flex-end; }
    .chat-footer { padding: 10px; border-top: 1px solid #ddd; }
    .chat-input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
    .chat-send { border: none; background-color: #25D366; color: white; padding: 10px; border-radius: 5px; cursor: pointer; }
    footer { background-color: #222; color: white; padding: 20px 0; text-align: center;}
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <h5>BlazePredict Chat</h5>
    </div>
    <div id="chatBox" class="chat-box">
      <!-- Messages will go here -->
    </div>
    <div class="chat-footer">
      <input type="text" id="chatInput" class="chat-input" placeholder="Type a message...">
      <button class="chat-send" onclick="sendChatMessage()">Send</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 BlazePredict | All Rights Reserved</p>
    <p><a href="index.html">Back to Home</a></p>
  </footer>

  <script src="blazepredict.js"></script>
  <script>
    // Chat functionality (simulating chat)
    function sendChatMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();

      if (message === '') return;

      // Add the sent message to chat
      const chatBox = document.getElementById('chatBox');
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('chat-message');
      messageDiv.innerHTML = `<div class="message sent">${message}</div>`;
      chatBox.appendChild(messageDiv);

      // Scroll to the bottom
      chatBox.scrollTop = chatBox.scrollHeight;

      // Clear the input field
      input.value = '';

      // Simulate a response after 1 second
      setTimeout(() => {
        const responseDiv = document.createElement('div');
        responseDiv.classList.add('chat-message');
        responseDiv.innerHTML = `<div class="message">Thanks for reaching out! How can I assist you?</div>`;
        chatBox.appendChild(responseDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
      }, 1000);
    }
  </script>
</body>
</html>
