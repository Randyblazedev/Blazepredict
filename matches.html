<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlazePredict — Today's Matches</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f1f5f9; color: #0f172a; }
    .navbar { background: #0f172a !important; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
    .navbar-brand { font-weight: 700; font-size: 1.3rem; letter-spacing: -.5px; }
    .nav-link { font-weight: 500; font-size: .9rem; }
    .page-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      color: #fff; padding: 40px 0 48px; text-align: center;
    }
    .page-header h2 { font-weight: 700; margin-bottom: 6px; }
    .page-header p { opacity: .7; margin: 0; font-size: .95rem; }
    #matchesContainer { max-width: 680px; margin: 0 auto; padding: 0 16px; }
    .match-card {
      background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      transition: all .2s; border: 1px solid #e2e8f0;
    }
    .match-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,.08); transform: translateY(-2px); }
    .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .team { font-weight: 700; font-size: 1rem; color: #0f172a; }
    .team.home { text-align: left; }
    .team.away { text-align: right; }
    .vs { color: #94a3b8; font-weight: 400; font-size: .8rem; background: #f1f5f9; padding: 4px 12px; border-radius: 20px; flex-shrink: 0; }
    .match-prediction { margin-top: 14px; font-size: .9rem; color: #475569; text-align: center; }
    .match-prediction strong { color: #FF5733; background: rgba(255,87,51,.08); padding: 2px 10px; border-radius: 6px; }
    .match-bars { margin-top: 12px; }
    .bar-track { display: flex; height: 32px; border-radius: 16px; overflow: hidden; font-size: .75rem; font-weight: 700; }
    .bar { display: flex; align-items: center; justify-content: center; transition: width .5s ease; min-width: 24px; }
    .bar.home { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; }
    .bar.away { background: linear-gradient(135deg, #f97316, #ea580c); color: #fff; }
    .match-competition { margin-top: 10px; font-size: .75rem; color: #94a3b8; text-align: center; text-transform: uppercase; letter-spacing: .5px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .error-state { text-align: center; padding: 40px 20px; }
    .spinner-wrap { text-align: center; padding: 60px 20px; }
    footer { background: #0f172a; color: #94a3b8; padding: 24px 0; text-align: center; font-size: .85rem; margin-top: 48px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark px-4">
    <a class="navbar-brand" href="index.html">⚡ BlazePredict</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link active" href="matches.html">📊 Matches</a>
      <a class="nav-link" href="chat.html">💬 Chat</a>
    </div>
  </nav>

  <div class="page-header">
    <h2>📊 Today's Matches</h2>
    <p>Predictions based on recent form and performance data</p>
  </div>

  <div class="py-4">
    <div id="matchesContainer"></div>
  </div>

  <footer>
    <p>&copy; 2026 BlazePredict — Built by <a href="https://github.com/Randyblazedev" target="_blank" style="color:#FF5733;text-decoration:none;">RandyBlazedev</a></p>
  </footer>

  <script src="blazepredict.js"></script>
</body>
</html>
