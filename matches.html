<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlazePredict — Today's Matches</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f8fafc; }
    .match-card {
      background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .15s;
    }
    .match-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 1.1rem; font-weight: 600; }
    .match-teams .vs { color: #94a3b8; font-weight: 400; font-size: .85rem; }
    .match-teams .team { flex: 1; }
    .match-teams .team.away { text-align: right; }
    .match-prediction { margin-top: 12px; color: #475569; font-size: .95rem; }
    .match-prediction strong { color: #FF5733; }
    .match-bars { margin-top: 12px; }
    .bar-track { display: flex; height: 28px; border-radius: 14px; overflow: hidden; font-size: .75rem; font-weight: 600; }
    .bar { display: flex; align-items: center; justify-content: center; transition: width .4s; }
    .bar.home { background: #3b82f6; color: #fff; }
    .bar.away { background: #f97316; color: #fff; }
    .match-competition { margin-top: 8px; font-size: .8rem; color: #94a3b8; }
    footer { background-color: #222; color: white; padding: 20px 0; text-align: center; margin-top: 40px; }
    footer a { color: #FF5733; text-decoration: none; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" href="index.html">⚡ BlazePredict</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link active" href="matches.html">Matches</a>
      <a class="nav-link" href="chat.html">Chat</a>
    </div>
  </nav>

  <section class="container py-5">
    <h2 class="text-center fw-bold">Today's Football Matches</h2>
    <p class="text-center text-muted">Predictions based on recent form and stats</p>
    <div id="matchesContainer" class="mt-4" style="max-width: 700px; margin: 0 auto;"></div>
  </section>

  <footer>
    <p>&copy; 2026 BlazePredict | All Rights Reserved</p>
    <p><a href="index.html">Back to Home</a></p>
  </footer>

  <script src="blazepredict.js"></script>
</body>
</html>
